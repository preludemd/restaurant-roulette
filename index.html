<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restaurant Roulette</title>
 <script async src="https://www.googletagmanager.com/gtag/js?id=G-M3N2C630PL"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-M3N2C630PL');
</script>
<meta name="description" content="Stop arguing about where to eat. Spin to find your next meal." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
  #app { max-width: 480px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 26px; font-weight: 600; text-align: center; margin-bottom: 4px; }
  .tagline { font-size: 15px; color: #666; text-align: center; margin-bottom: 1.5rem; }
  .location-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .location-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fff; outline: none; }
  .location-row input:focus { border-color: #888; }
  .geo-btn { padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; font-size: 18px; }
  .geo-btn:hover { background: #f0f0f0; }
  .filters { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filters select { flex: 1; min-width: 120px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: #fff; outline: none; cursor: pointer; }
  .slot-machine { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; text-align: center; height: 160px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .slot-window { height: 120px; overflow: hidden; width: 100%; position: relative; }
  .slot-reel { display: flex; flex-direction: column; align-items: center; }
  .slot-item { height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 0 1rem; flex-shrink: 0; }
  .slot-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
  .slot-meta { font-size: 13px; color: #888; }
  .placeholder-icon { font-size: 42px; margin-bottom: 8px; }
  .placeholder-text { font-size: 14px; color: #aaa; }
  .spin-btn { width: 100%; font-size: 17px; font-weight: 600; padding: 15px; border-radius: 12px; cursor: pointer; background: #1a1a1a; color: #fff; border: none; margin-bottom: 1rem; transition: opacity 0.15s, transform 0.1s; }
  .spin-btn:hover { opacity: 0.85; }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.25rem; display: none; }
  .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .result-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .result-cuisine { font-size: 13px; color: #888; margin-top: 3px; }
  .result-price { font-size: 16px; color: #444; font-weight: 500; }
  .result-stats { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat { font-size: 13px; color: #666; display: flex; align-items: center; gap: 4px; }
  .stars { color: #e2a800; }
  .result-address { font-size: 13px; color: #888; margin-bottom: 14px; }
  .action-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .action-btn { flex: 1; font-size: 13px; font-weight: 500; padding: 10px 8px; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #1a1a1a; transition: background 0.1s; }
  .action-btn:hover { background: #f5f5f5; }
  .action-btn.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
  .action-btn.primary:hover { opacity: 0.85; background: #1a1a1a; }
  .nope-btn { width: 100%; font-size: 14px; padding: 11px; border-radius: 10px; cursor: pointer; background: transparent; border: 1px solid #e8e8e8; color: #888; transition: background 0.1s; }
  .nope-btn:hover { background: #f5f5f5; }
  .error-msg { font-size: 13px; color: #c0392b; text-align: center; margin-bottom: 1rem; display: none; background: #fdf0ef; padding: 10px; border-radius: 10px; }
  .loading-msg { font-size: 13px; color: #888; text-align: center; margin-bottom: 1rem; display: none; }
  .photo { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 14px; display: none; background: #f0f0f0; }
  .open-badge { font-size: 12px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .open-yes { background: #e6f4ea; color: #1e7e34; }
  .open-no { background: #fdecea; color: #c0392b; }
</style>
</head>
<body>
<div id="app">
  <h1>🎰 Restaurant Roulette</h1>
  <p class="tagline">Stop arguing. Start eating.</p>

  <div class="location-row">
    <input type="text" id="location" placeholder="Enter your city or zip code..." />
    <button class="geo-btn" onclick="useMyLocation()" title="Use my location">📍</button>
  </div>

  <div class="filters">
    <select id="cuisine">
      <option value="">Any cuisine</option>
      <option value="newamerican">American</option>
      <option value="italian">Italian</option>
      <option value="mexican">Mexican</option>
      <option value="chinese">Chinese</option>
      <option value="japanese">Japanese</option>
      <option value="pizza">Pizza</option>
      <option value="burgers">Burgers</option>
      <option value="seafood">Seafood</option>
      <option value="thai">Thai</option>
      <option value="indpak">Indian</option>
      <option value="bbq">BBQ</option>
    </select>
    <select id="price">
      <option value="">Any price</option>
      <option value="1">$ Budget</option>
      <option value="2">$$ Moderate</option>
      <option value="3">$$$ Upscale</option>
      <option value="4">$$$$ Fine dining</option>
    </select>
    <select id="radius">
      <option value="4000">Within 2.5 miles</option>
      <option value="8000" selected>Within 5 miles</option>
      <option value="16000">Within 10 miles</option>
      <option value="40000">Within 25 miles</option>
    </select>
  </div>

  <p class="error-msg" id="errorMsg"></p>
  <p class="loading-msg" id="loadingMsg">🔍 Finding restaurants near you...</p>

  <div class="slot-machine">
    <div class="slot-window">
      <div class="slot-reel" id="reel">
        <div class="slot-item" id="placeholder">
          <div class="placeholder-icon">🍽️</div>
          <div class="placeholder-text">Hit spin to find your next meal</div>
        </div>
      </div>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 Spin the wheel</button>

  <div class="result-card" id="resultCard">
    <img id="resPhoto" class="photo" alt="Restaurant photo" />
    <div class="result-header">
      <div>
        <div class="result-name" id="resName"></div>
        <div class="result-cuisine" id="resCuisine"></div>
      </div>
      <div style="text-align:right;">
        <div class="result-price" id="resPrice"></div>
        <div style="margin-top:4px;" id="resOpenBadge"></div>
      </div>
    </div>
    <div class="result-stats">
      <div class="stat"><span class="stars" id="resStars"></span>&nbsp;<span id="resRating"></span></div>
      <div class="stat">📍 <span id="resDist"></span></div>
      <div class="stat">💬 <span id="resReviews"></span></div>
    </div>
    <div class="result-address" id="resAddress"></div>
    <div class="action-row">
      <button class="action-btn primary" onclick="getDirections()">🗺️ Directions</button>
      <button class="action-btn" onclick="callRestaurant()">📞 Call</button>
      <button class="action-btn" onclick="seeYelp()">⭐ Reviews</button>
    </div>
    <button class="nope-btn" onclick="spinFromPool()">😬 Not feeling it — spin again</button>
  </div>
</div>

<script>
let pool = [];
let current = null;
let spinning = false;
let currentLocation = '';

function metersToMiles(m) { return (m / 1609.34).toFixed(1) + ' mi'; }

function starsFor(r) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    if (r >= i) s += '★';
    else if (r >= i - 0.5) s += '½';
    else s += '☆';
  }
  return s;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function setLoading(on) {
  document.getElementById('loadingMsg').style.display = on ? 'block' : 'none';
  document.getElementById('spinBtn').disabled = on;
}

async function fetchRestaurants(location) {
  const cuisine = document.getElementById('cuisine').value;
  const price = document.getElementById('price').value;
  const radius = document.getElementById('radius').value;
  const params = new URLSearchParams({ location, radius });
  if (cuisine) params.append('cuisine', cuisine);
  if (price) params.append('price', price);
  const res = await fetch(`/api/restaurants?${params}`);
  if (!res.ok) throw new Error('Could not load restaurants');
  return await res.json();
}

function useMyLocation() {
  if (!navigator.geolocation) return showError('Geolocation not supported by your browser.');
  setLoading(true);
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const loc = `${pos.coords.latitude},${pos.coords.longitude}`;
      currentLocation = loc;
      document.getElementById('location').value = 'Using your location 📍';
      try {
        pool = await fetchRestaurants(loc);
        if (!pool.length) return showError('No restaurants found nearby. Try expanding your search radius.');
        setLoading(false);
        spinFromPool();
      } catch(e) {
        setLoading(false);
        showError('Could not load restaurants. Please try again.');
      }
    },
    () => {
      setLoading(false);
      showError('Could not get your location. Please type it in instead.');
    }
  );
}

async function spin() {
  const location = document.getElementById('location').value.trim();
  if (!location || location === 'Using your location 📍') {
    if (currentLocation) { spinFromPool(); return; }
    showError('Please enter your city or zip code first.');
    return;
  }
  currentLocation = location;
  setLoading(true);
  document.getElementById('resultCard').style.display = 'none';
  try {
    pool = await fetchRestaurants(location);
    if (!pool.length) { setLoading(false); showError('No restaurants found. Try a different location or adjust your filters.'); return; }
    setLoading(false);
    spinFromPool();
  } catch(e) {
    setLoading(false);
    showError('Something went wrong. Please check your location and try again.');
  }
}

function spinFromPool() {
  if (spinning || !pool.length) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultCard').style.display = 'none';

  const picks = [];
  for (let i = 0; i < 14; i++) picks.push(pool[Math.floor(Math.random() * pool.length)]);
  current = picks[picks.length - 1];

  const reel = document.getElementById('reel');
  reel.innerHTML = '';
  picks.forEach(r => {
    const el = document.createElement('div');
    el.className = 'slot-item';
    el.innerHTML = `<div class="slot-name">${r.name}</div><div class="slot-meta">${(r.categories||[]).map(c=>c.title).join(', ')} · ${r.price || '?'} · ${starsFor(r.rating)}</div>`;
    reel.appendChild(el);
  });

  const itemH = 120;
  let frame = 0;
  const totalFrames = 65;
  function ease(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  function animate() {
    frame++;
    const t = ease(Math.min(frame / totalFrames, 1));
    reel.style.transform = `translateY(-${t * (picks.length - 1) * itemH}px)`;
    if (frame < totalFrames) { requestAnimationFrame(animate); }
    else {
      reel.style.transform = `translateY(-${(picks.length - 1) * itemH}px)`;
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showResult(current);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(r) {
  const photo = document.getElementById('resPhoto');
  if (r.image_url) { photo.src = r.image_url; photo.style.display = 'block'; }
  else { photo.style.display = 'none'; }
  document.getElementById('resName').textContent = r.name;
  document.getElementById('resCuisine').textContent = (r.categories||[]).map(c=>c.title).join(', ');
  document.getElementById('resPrice').textContent = r.price || '';
  document.getElementById('resStars').textContent = starsFor(r.rating);
  document.getElementById('resRating').textContent = r.rating?.toFixed(1) + ' (' + (r.review_count||0).toLocaleString() + ' reviews)';
  document.getElementById('resDist').textContent = r.distance ? metersToMiles(r.distance) : '';
  document.getElementById('resReviews').textContent = '';
  document.getElementById('resAddress').textContent = r.location?.display_address?.join(', ') || '';
  const isOpen = r.hours?.[0]?.is_open_now;
  const badge = document.getElementById('resOpenBadge');
  if (isOpen === true) badge.innerHTML = '<span class="open-badge open-yes">Open now</span>';
  else if (isOpen === false) badge.innerHTML = '<span class="open-badge open-no">Closed</span>';
  else badge.innerHTML = '';
  document.getElementById('resultCard').style.display = 'block';
}

function getDirections() {
  if (!current) return;
  const addr = current.location?.display_address?.join(', ') || '';
  openLink(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}`);
}

function callRestaurant() {
  if (!current?.phone) return showError('No phone number available for this restaurant.');
  window.location.href = `tel:${current.phone}`;
}

function seeYelp() {
  if (!current?.url) return;
  openLink(current.url);
}

function openLink(url) {
  window.open(url, '_blank');
}
</script>
</body>
</html>
